name: 検索順位トラッカー（Yahoo・毎日実行）

on:
  schedule:
    # UTC 01:12 = JST 10:12
    # 注: GitHub Actions のスケジュールは混雑状況により数分〜数十分遅延することがある。
    # さらに毎時00分ちょうどは最も混雑して間引かれやすいため、あえて12分にずらしている。
    # それでもスケジュールは best-effort で、稀に実行が飛ぶことがある（毎日必須ではない前提）。
    - cron: '12 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Firestore に保存せずテスト実行する'
        type: boolean
        default: false

# 前回の実行が終わっていない場合に二重実行させない
concurrency:
  group: rank-tracker
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: ライブラリをインストール
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      - name: serviceAccountKey.json を Secrets から復元
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::Secret FIREBASE_SERVICE_ACCOUNT が設定されていません"
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > scraper/serviceAccountKey.json
          # JSON として妥当か検証（改行の混入・コピー漏れをここで検出する）
          python -c "import json;json.load(open('scraper/serviceAccountKey.json'))"
          echo "serviceAccountKey.json を復元しました"

      - name: スクレイピング実行（Yahooのみ）
        working-directory: scraper
        # 楽天はデータセンターIPをブロックするため、Yahooのみクラウドで実行する。
        # 楽天はオフィスPCのタスクスケジューラが担当する。
        run: python main.py --platform yahoo ${{ inputs.dry_run && '--dry-run' || '' }}

      - name: 認証情報を削除
        if: always()
        run: rm -f scraper/serviceAccountKey.json

      - name: ログを Artifact として保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: scraper/logs/
          retention-days: 14
          if-no-files-found: ignore
